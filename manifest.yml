app:
  runtime:
    name: nodejs22.x
    memoryMB: 512
    architecture: arm64
  id: ari:cloud:ecosystem::app/00ef5308-e5d8-48a2-9267-2b6a1e029c23

modules:
  jira:projectPage:
    - key: ipa-audit-dashboard
      resource: main
      resolver:
        function: resolver
      render: native
      title: IPA Audit Manager
      properties:
        contentSecurityPolicy:
          workerSrc: "'self' blob: https://forge.cdn.prod.atlassian-dev.net
            https://tdp-os.services.atlassian.com
            https://object-store.atlassian.com"
  function:
    - key: resolver
      handler: resolvers/index.handler

resources:
  - key: main
    path: src/frontend/index.tsx

permissions:
  scopes:
    - read:sprint:jira-software
    - read:jira-work
    - read:jira-user
    - storage:app
